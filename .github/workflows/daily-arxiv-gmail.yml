name: Daily Experimental HEP AI/ML arXiv Gmail Digest

on:
  schedule:
    - cron: "17 8 * * *"
      timezone: "Asia/Hong_Kong"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate the digest in GitHub Actions without sending email"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      preview_all:
        description: "Manual test only: include already-seen papers and skip state commit"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-arxiv-gmail
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate arXiv digest
        if: github.event_name != 'workflow_dispatch' || (inputs.dry_run != 'true' && inputs.preview_all != 'true')
        run: bash run_arxiv_digest.sh

      - name: Generate arXiv digest for manual preview
        if: github.event_name == 'workflow_dispatch' && (inputs.dry_run == 'true' || inputs.preview_all == 'true')
        run: bash run_arxiv_digest.sh --ignore-state --ignore-date

      - name: Post digest as a GitHub issue
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          title_line=$(grep -m1 '^# ' digests/latest.md | sed 's/^# *//' || true)
          [ -z "$title_line" ] && title_line="arXiv Digest"
          count=$(grep -m1 '^New papers:' digests/latest.md | grep -oE '[0-9]+' | head -1 || true)
          gen_date=$(grep -m1 '^Generated:' digests/latest.md | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1 || true)
          [ -z "$gen_date" ] && gen_date=$(date -u +%F)
          if [ -n "$count" ]; then
            noun=papers; [ "$count" = "1" ] && noun=paper
            title="$title_line - $count new $noun - $gen_date"
          else
            title="$title_line - $gen_date"
          fi
          # Ensure the label exists (idempotent); never fail the run over labelling.
          gh label create digest --color 1f6feb --description "Daily arXiv digest" --force >/dev/null 2>&1 || true
          # Creating the issue with the digest body is the critical step — fail loudly if it breaks.
          url=$(gh issue create --title "$title" --body-file digests/latest.md)
          echo "Created issue: $url"
          num=${url##*/}
          # Best-effort: label + assign (assignment triggers the GitHub Mobile push).
          gh issue edit "$num" --add-label digest --add-assignee "$OWNER" >/dev/null 2>&1 || echo "note: could not label/assign issue $num"
          # Tidy: keep only today's digest issue open; older ones get closed (history preserved).
          for n in $(gh issue list --label digest --state open --json number --jq '.[].number' 2>/dev/null || true); do
            [ "$n" != "$num" ] && gh issue close "$n" --comment "Superseded by a newer digest." >/dev/null 2>&1 || true
          done

      - name: Send digest to Gmail
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true'
        continue-on-error: true
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ARXIV_DIGEST_RECIPIENTS: ${{ secrets.ARXIV_DIGEST_RECIPIENTS }}
        run: python3 send_digest_email.py

      - name: Build email in dry-run mode
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        env:
          GMAIL_USER: dry-run@example.com
          GMAIL_APP_PASSWORD: dry-run
          ARXIV_DIGEST_RECIPIENTS: dry-run@example.com
        run: python3 send_digest_email.py --dry-run

      - name: Commit seen-paper state
        if: github.event_name != 'workflow_dispatch' || (inputs.dry_run != 'true' && inputs.preview_all != 'true')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/seen.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update arXiv digest state"
            git push
          fi
